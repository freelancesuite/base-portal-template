<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreelanceSuite Portal</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- =========================
     LOADER
========================= -->

<div id="loader" class="loader hidden">

    <div class="spinner"></div>

    <h3 id="loaderText">
        Loading...
    </h3>

</div>




<!-- =========================
     MAIN CONTAINER
========================= -->

<div class="container">


<!-- =========================
     ADMIN VIEW
========================= -->


<section id="adminView" class="card hidden">


<h2>
🚀 Freelancer Dashboard
</h2>


<p>
Create invoice and upload project files.
</p>



<div class="form-group">

<label>
Invoice Number
</label>

<input 
id="invoiceNo"
placeholder="INV-2026-001">

</div>




<div class="form-group">

<label>
Client Name
</label>

<input 
id="clientName"
placeholder="Client name">

</div>




<div class="form-group">

<label>
Client Email
</label>

<input 
id="clientEmail"
placeholder="email">

</div>





<div class="form-group">

<label>
Amount
</label>

<input 
type="number"
id="amount"
placeholder="0.00">

</div>




<div class="form-group">

<label>
Upload Deliverable
</label>


<input 
type="file"
id="projectFile">


</div>





<button 
class="btn primary"
onclick="createInvoice()">

Create Invoice

</button>




<div 
id="invoiceResult"
class="result">

</div>



</section>








<!-- =========================
     CLIENT VIEW
========================= -->


<section id="clientView" class="card hidden">


<h2>
💼 Client Payment Portal
</h2>


<p>
Secure invoice and file delivery
</p>




<hr>




<div class="invoice-box">


<table>


<tr>
<th>Invoice</th>
<td id="viewInvoice">
-
</td>
</tr>



<tr>
<th>
Client
</th>

<td id="viewClient">
-
</td>

</tr>




<tr>

<th>
Amount
</th>

<td id="viewAmount">
0
</td>

</tr>




<tr>

<th>
Status
</th>

<td>

<span 
id="viewStatus"
class="badge unpaid">

Unpaid

</span>

</td>

</tr>


</table>


</div>






<div 
id="receiptBox">


<h3>
Upload Payment Receipt
</h3>



<input 
type="file"
id="receiptFile"
accept="image/*">



<button
class="btn"
onclick="uploadReceipt()">

Submit Receipt

</button>


</div>





<button

id="downloadBtn"

class="btn success"

disabled

onclick="downloadFile()">


Download Files


</button>






</section>







</div>









<script>


/* ============================
CONFIG
============================ */


const CONFIG = {


API:
"https://script.google.com/macros/s/AKfycbwmNAEO5TAqMQEMd6nYrpANeuhVk1Y32VKRWg92GU65RkZj2dmWtpT33i8RoCUc6WXuvQ/exec"


};






/* ============================
GLOBAL
============================ */


let invoiceID = "";







/* ============================
ROUTER
============================ */



window.onload = ()=>{


const params =
new URLSearchParams(
window.location.search
);



invoiceID =
params.get("invoice");



let admin =
params.get("admin");





if(invoiceID)
{


showClient();


loadInvoice(
invoiceID
);


}

else
{


showAdmin();


}



};







function showAdmin()
{


document
.getElementById("adminView")
.classList.remove("hidden");


}





function showClient()
{


document
.getElementById("clientView")
.classList.remove("hidden");


}








/* ============================
HELPERS
============================ */



function loader(show,text="Loading...")
{


let box =
document.getElementById("loader");


let label =
document.getElementById("loaderText");



label.innerHTML=text;



if(show)

box.classList.remove("hidden");


else

box.classList.add("hidden");


}







function post(data)
{


return fetch(
CONFIG.API,
{


method:"POST",

headers:
{

"Content-Type":
"application/json"

},


body:
JSON.stringify(data)


})
.then(r=>r.json());


}








</script>


</body>

</html>
