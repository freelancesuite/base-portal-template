<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreelanceSuite Portal</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- =========================
     LOADER
========================= -->

<div id="loader" class="loader hidden">

    <div class="spinner"></div>

    <h3 id="loaderText">
        Loading...
    </h3>

</div>




<!-- =========================
     MAIN CONTAINER
========================= -->

<div class="container">


<!-- =========================
     ADMIN VIEW
========================= -->


<section id="adminView" class="card hidden">


<h2>
🚀 Freelancer Dashboard
</h2>


<p>
Create invoice and upload project files.
</p>



<div class="form-group">

<label>
Invoice Number
</label>

<input 
id="invoiceNo"
placeholder="INV-2026-001">

</div>




<div class="form-group">

<label>
Client Name
</label>

<input 
id="clientName"
placeholder="Client name">

</div>




<div class="form-group">

<label>
Client Email
</label>

<input 
id="clientEmail"
placeholder="email">

</div>





<div class="form-group">

<label>
Amount
</label>

<input 
type="number"
id="amount"
placeholder="0.00">

</div>




<div class="form-group">

<label>
Upload Deliverable
</label>


<input 
type="file"
id="projectFile">


</div>





<button 
class="btn primary"
onclick="createInvoice()">

Create Invoice

</button>




<div 
id="invoiceResult"
class="result">

</div>



</section>








<!-- =========================
     CLIENT VIEW
========================= -->


<section id="clientView" class="card hidden">


<h2>
💼 Client Payment Portal
</h2>


<p>
Secure invoice and file delivery
</p>




<hr>




<div class="invoice-box">


<table>


<tr>
<th>Invoice</th>
<td id="viewInvoice">
-
</td>
</tr>



<tr>
<th>
Client
</th>

<td id="viewClient">
-
</td>

</tr>




<tr>

<th>
Amount
</th>

<td id="viewAmount">
0
</td>

</tr>




<tr>

<th>
Status
</th>

<td>

<span 
id="viewStatus"
class="badge unpaid">

Unpaid

</span>

</td>

</tr>


</table>


</div>






<div 
id="receiptBox">


<h3>
Upload Payment Receipt
</h3>



<input 
type="file"
id="receiptFile"
accept="image/*">



<button
class="btn"
onclick="uploadReceipt()">

Submit Receipt

</button>


</div>





<button

id="downloadBtn"

class="btn success"

disabled

onclick="downloadFile()">


Download Files


</button>






</section>







</div>









<script>


/* ============================
CONFIG
============================ */


const CONFIG = {


API:
"https://script.google.com/macros/s/AKfycbwmNAEO5TAqMQEMd6nYrpANeuhVk1Y32VKRWg92GU65RkZj2dmWtpT33i8RoCUc6WXuvQ/exec"


};






/* ============================
GLOBAL
============================ */


let invoiceID = "";







/* ============================
ROUTER
============================ */



window.onload = ()=>{


const params =
new URLSearchParams(
window.location.search
);



invoiceID =
params.get("invoice");



let admin =
params.get("admin");





if(invoiceID)
{


showClient();


loadInvoice(
invoiceID
);


}

else
{


showAdmin();


}



};







function showAdmin()
{


document
.getElementById("adminView")
.classList.remove("hidden");


}





function showClient()
{


document
.getElementById("clientView")
.classList.remove("hidden");


}








/* ============================
HELPERS
============================ */



function loader(show,text="Loading...")
{


let box =
document.getElementById("loader");


let label =
document.getElementById("loaderText");



label.innerHTML=text;



if(show)

box.classList.remove("hidden");


else

box.classList.add("hidden");


}







function post(data)
{


return fetch(
CONFIG.API,
{


method:"POST",

headers:
{

"Content-Type":
"application/json"

},


body:
JSON.stringify(data)


})
.then(r=>r.json());


}



 
/* ============================
   CREATE INVOICE
============================ */


async function createInvoice()
{


let invoice =
document.getElementById("invoiceNo").value;


let client =
document.getElementById("clientName").value;


let email =
document.getElementById("clientEmail").value;


let amount =
document.getElementById("amount").value;


let file =
document.getElementById("projectFile").files[0];




if(!invoice || !client || !amount || !file)
{

alert(
"Complete all fields"
);

return;

}




loader(
true,
"Uploading project..."
);





try
{


let base64 =
await readFile(file);




let upload =
await post(
{


action:"uploadProject",


repoName:"freelance",


clientName:client,


fileName:file.name,


mimeType:file.type,


fileData:base64


});





if(upload.status!=="success")
{

throw new Error(
"Upload failed"
);

}




loader(
true,
"Creating invoice..."
);






let result =
await post(
{


action:"createInvoice",


invoiceNo:invoice,


client:client,


email:email,


amount:amount,


fileUrl:
upload.fileUrl


});







loader(false);




if(result.status==="success")
{


let link =
window.location.origin
+
window.location.pathname
+
"?invoice="
+
invoice;



document
.getElementById("invoiceResult")
.innerHTML = `

<h3>
Invoice Created
</h3>

<p>
Send this link:
</p>


<input value="${link}" readonly>


`;



}

else
{

alert(
"Invoice failed"
);


}



}

catch(e)
{


loader(false);


console.error(e);


alert(
e.message
);


}


}








/* ============================
   LOAD INVOICE
============================ */


async function loadInvoice(id)
{


loader(
true,
"Loading invoice..."
);



try
{


let data =
await fetch(
CONFIG.API
+
"?action=getInvoice&id="
+
id

)
.then(
r=>r.json()
);





loader(false);




if(data.status==="success")
{


document
.getElementById("viewInvoice")
.innerHTML =
data.invoiceNo;



document
.getElementById("viewClient")
.innerHTML =
data.client;



document
.getElementById("viewAmount")
.innerHTML =
data.amount
+
" PHP";




let status =
document
.getElementById("viewStatus");



status.innerHTML =
data.status;



status.className =
"badge "
+
data.status.toLowerCase();





if(
data.status==="PAID"
)

{


document
.getElementById("downloadBtn")
.disabled=false;



document
.getElementById("receiptBox")
.style.display="none";


}



}


else
{


alert(
"Invoice not found"
);


}



}
catch(e)
{


loader(false);


alert(
"Cannot load invoice"
);


}


}









/* ============================
   UPLOAD RECEIPT
============================ */



async function uploadReceipt()
{


let file =
document
.getElementById("receiptFile")
.files[0];



if(!file)
{


alert(
"Select receipt"
);


return;


}





loader(
true,
"Uploading receipt..."
);




let base64 =
await readFile(file);





let result =
await post(
{


action:
"uploadReceipt",


invoiceNo:
invoiceID,


fileName:
file.name,


fileData:
base64,


mimeType:
file.type


});




loader(false);




if(result.status==="success")
{


alert(
"Receipt uploaded. Waiting approval."
);


location.reload();


}
else
{


alert(
"Upload failed"
);


}



}








/* ============================
 DOWNLOAD FILE
============================ */


async function downloadFile()
{


loader(
true,
"Preparing download..."
);



let result =
await fetch(

CONFIG.API
+
"?action=downloadFile&id="
+
invoiceID

)
.then(
r=>r.json()
);




loader(false);




if(result.downloadUrl)
{


window.open(
result.downloadUrl,
"_blank"
);


}
else
{


alert(
"Not available"
);


}


}








/* ============================
 FILE READER
============================ */


function readFile(file)
{


return new Promise(
resolve=>{


let reader =
new FileReader();



reader.onload =
e=>{


resolve(
e.target.result.split(",")[1]
);


};



reader.readAsDataURL(file);



});


}





</script>


</body>

</html>
