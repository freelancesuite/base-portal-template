<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
FreelanceSuite Client Portal
</title>


<style>

body{

font-family:
Segoe UI,Arial;

background:#f4f6f9;

margin:0;

padding:20px;

}


.container{

max-width:650px;

margin:auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:
0 10px 30px #0002;

}



h1{

color:#2c3e50;

}



.card{

background:#fafafa;

padding:20px;

border-radius:12px;

margin-top:20px;

}



.status{

padding:8px 15px;

border-radius:20px;

font-weight:bold;

}



.UNPAID{

background:#f1c40f;

}



.PAID{

background:#2ecc71;

color:white;

}



button{

padding:12px;

border:0;

border-radius:8px;

cursor:pointer;

background:#3498db;

color:white;

width:100%;

}



input{

width:100%;

padding:10px;

box-sizing:border-box;

}



.hidden{

display:none;

}


</style>


</head>


<body>



<div class="container">


<h1>
💼 FreelanceSuite Portal
</h1>


<div class="card">


<h3>
Invoice
</h3>


<p>
Invoice:
<span id="invoice">
-
</span>
</p>


<p>
Client:
<span id="client">
-
</span>
</p>



<p>
Amount:
<span id="amount">
-
</span>
</p>



<p>
Status:
<span 
id="status"
class="status">

-

</span>

</p>


</div>




<div id="paymentBox"
class="card">



<h3>
Upload Payment Receipt
</h3>


<input
type="file"
id="receipt">


<br><br>


<button onclick="uploadReceipt()">

Submit Receipt

</button>


</div>





<div id="downloadBox"
class="card hidden">


<h3>
Payment Verified
</h3>


<button onclick="downloadFile()">

Download Files

</button>


</div>



</div>







<script>



const API =

"https://script.google.com/macros/s/AKfycbwmNAEO5TAqMQEMd6nYrpANeuhVk1Y32VKRWg92GU65RkZj2dmWtpT33i8RoCUc6WXuvQ/exec";




const params =
new URLSearchParams(
location.search
);



const invoiceId =
params.get("invoice");



const repoName =
location.pathname
.split("/")
[1];





loadInvoice();





async function loadInvoice(){



let res =
await fetch(
API+
"?action=getInvoice&id="+
invoiceId+
"&repoName="+
repoName
);



let data =
await res.json();




if(data.error){

alert(
data.error
);

return;

}




document
.getElementById("invoice")
.innerText =
data.id;



document
.getElementById("client")
.innerText =
data.client;



document
.getElementById("amount")
.innerText =
data.amount;



let status =
document
.getElementById("status");



status.innerText =
data.status;



status.className =
"status "+
data.status;




if(
data.status==="PAID"
){

document
.getElementById("paymentBox")
.classList
.add("hidden");


document
.getElementById("downloadBox")
.classList
.remove("hidden");


}



}





async function uploadReceipt(){



let file =
document
.getElementById("receipt")
.files[0];



if(!file){

alert(
"Select receipt"
);

return;

}



let reader =
new FileReader();



reader.onload =
async()=>{


let result =
await fetch(
API,
{

method:"POST",

body:JSON.stringify({

action:"uploadReceipt",

repoName:repoName,

invoice:invoiceId,

fileName:file.name,

fileData:
reader.result.split(",")[1]

})


});



alert(
"Receipt submitted"
);



location.reload();


};



reader.readAsDataURL(file);


}






async function downloadFile(){



let res =
await fetch(

API+
"?action=downloadFile&id="+
invoiceId+
"&repoName="+
repoName

);



let data =
await res.json();



if(data.downloadUrl)

window.open(
data.downloadUrl,
"_blank"
);


else

alert(
"Payment not approved"
);


}



</script>


</body>

</html>
